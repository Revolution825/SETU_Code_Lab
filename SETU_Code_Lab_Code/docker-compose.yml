services:
  # PostgreSQL Database
  db:
    image: postgres:17-alpine
    container_name: setu_codelab_db
    restart: unless-stopped
    environment:
      # Postgres looks for these environment variables on startup
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      # Persist database data across container restarts
      - postgres_data:/var/lib/postgresql/data
      # Place new database schema files in server/db/init/ and they will
      # create a fresh db the first time the container starts
      - ./server/db/init:/docker-entrypoint-initdb.d
    ports:
      - "127.0.0.1:5432:5432"
    healthcheck:
      # ensures database is ready to accept connections
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Web Server
  server:
    build:
      context: ./server
      dockerfile: Dockerfile
    container_name: setu_codelab_server
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 3000

      # Db connection
      DB_HOST: db
      DB_PORT: 5432
      DB_NAME: ${DB_NAME}
      DB_USER: ${DB_USER}
      DB_PASSWORD: ${DB_PASSWORD}
      DATABASE_URL: postgresql://${DB_USER}:${DB_PASSWORD}@db:5432/${DB_NAME}

      # Auth
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRY: ${JWT_EXPIRY}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET}

      JAVA_EXECUTION_IMAGE: ${JAVA_EXECUTION_IMAGE}
      PYTHON_EXECUTION_IMAGE: ${PYTHON_EXECUTION_IMAGE}
    volumes:
      # Mount the host Docker socket so the server can spawn code execution containers
      - /var/run/docker.sock:/var/run/docker.sock
    expose:
      - "3000"

  # Client
  client:
    build:
      context: ./client
      dockerfile: Dockerfile
    container_name: setu_codelab_client
    restart: unless-stopped
    depends_on:
      - server
    ports:
      - "8080:80"

volumes:
  postgres_data: